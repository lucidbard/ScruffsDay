<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Saw Palmetto Fronds - Fan-shaped palm frond -->

  <!-- Stem -->
  <path d="M32 62 Q31 52 30 45 Q30 40 32 36" fill="none" stroke="#8B6914" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M32 62 Q33 52 34 45 Q34 40 32 36" fill="none" stroke="#6B5B3F" stroke-width="2" stroke-linecap="round"/>

  <!-- Fan frond segments radiating from top of stem -->
  <g id="frond" fill="#2E8B57" stroke="#000" stroke-width="3" stroke-linejoin="round">
    <!-- Center leaf -->
    <path d="M32 36 L32 4 Q34 6 35 36Z"/>
    <!-- Left leaves -->
    <path d="M32 36 L18 8 Q20 10 34 36Z"/>
    <path d="M32 36 L6 18 Q9 18 33 36Z"/>
    <path d="M32 36 L2 32 Q4 30 32 35Z"/>
    <!-- Right leaves -->
    <path d="M32 36 L46 8 Q44 10 30 36Z"/>
    <path d="M32 36 L58 18 Q55 18 31 36Z"/>
    <path d="M32 36 L62 32 Q60 30 32 35Z"/>
  </g>

  <!-- Leaf vein lines -->
  <g stroke="#228B22" stroke-width="1" opacity="0.6">
    <line x1="32" y1="35" x2="32" y2="8"/>
    <line x1="32" y1="35" x2="19" y2="12"/>
    <line x1="32" y1="35" x2="8" y2="22"/>
    <line x1="32" y1="35" x2="45" y2="12"/>
    <line x1="32" y1="35" x2="56" y2="22"/>
  </g>
</svg>