<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Chapman Oak Acorns - 3 grouped acorns -->

  <!-- Acorn 1 (left) -->
  <g id="acorn-1">
    <!-- Acorn body -->
    <path d="M12 32 Q8 32 7 38 Q6 46 12 50 Q16 52 20 50 Q26 46 25 38 Q24 32 20 32Z" fill="#A0522D" stroke="#000" stroke-width="3"/>
    <!-- Body highlight -->
    <ellipse cx="13" cy="40" rx="3" ry="5" fill="#B8633A" opacity="0.5"/>
    <!-- Acorn tip -->
    <circle cx="16" cy="52" r="2" fill="#8B4513" stroke="#000" stroke-width="1.5"/>
    <!-- Cap -->
    <path d="M8 34 Q8 26 16 24 Q24 26 24 34 Q20 32 16 31 Q12 32 8 34Z" fill="#D2B48C" stroke="#000" stroke-width="3"/>
    <!-- Cap cross-hatch texture -->
    <path d="M11 30 Q16 28 21 30" fill="none" stroke="#C4A67C" stroke-width="1.5"/>
    <path d="M10 32 Q16 30 22 32" fill="none" stroke="#C4A67C" stroke-width="1.5"/>
    <!-- Stem -->
    <line x1="16" y1="24" x2="16" y2="18" stroke="#6B5B3F" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Acorn 2 (center, front) -->
  <g id="acorn-2">
    <!-- Acorn body -->
    <path d="M26 28 Q22 28 21 35 Q20 44 26 48 Q30 50 34 48 Q40 44 39 35 Q38 28 34 28Z" fill="#A0522D" stroke="#000" stroke-width="3"/>
    <!-- Body highlight -->
    <ellipse cx="28" cy="36" rx="3" ry="5" fill="#B8633A" opacity="0.5"/>
    <!-- Acorn tip -->
    <circle cx="30" cy="50" r="2" fill="#8B4513" stroke="#000" stroke-width="1.5"/>
    <!-- Cap -->
    <path d="M22 30 Q22 20 30 18 Q38 20 38 30 Q34 28 30 27 Q26 28 22 30Z" fill="#D2B48C" stroke="#000" stroke-width="3"/>
    <!-- Cap texture -->
    <path d="M25 25 Q30 22 35 25" fill="none" stroke="#C4A67C" stroke-width="1.5"/>
    <path d="M24 28 Q30 25 36 28" fill="none" stroke="#C4A67C" stroke-width="1.5"/>
    <!-- Stem -->
    <line x1="30" y1="18" x2="30" y2="11" stroke="#6B5B3F" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Little leaf -->
    <path d="M30 12 Q34 8 37 11 Q35 14 30 12Z" fill="#8FBC8F" stroke="#000" stroke-width="1.5"/>
  </g>

  <!-- Acorn 3 (right) -->
  <g id="acorn-3">
    <!-- Acorn body -->
    <path d="M42 34 Q38 34 37 40 Q36 48 42 52 Q46 54 50 52 Q56 48 55 40 Q54 34 50 34Z" fill="#A0522D" stroke="#000" stroke-width="3"/>
    <!-- Body highlight -->
    <ellipse cx="44" cy="42" rx="3" ry="5" fill="#B8633A" opacity="0.5"/>
    <!-- Acorn tip -->
    <circle cx="46" cy="54" r="2" fill="#8B4513" stroke="#000" stroke-width="1.5"/>
    <!-- Cap -->
    <path d="M38 36 Q38 28 46 26 Q54 28 54 36 Q50 34 46 33 Q42 34 38 36Z" fill="#D2B48C" stroke="#000" stroke-width="3"/>
    <!-- Cap texture -->
    <path d="M41 32 Q46 29 51 32" fill="none" stroke="#C4A67C" stroke-width="1.5"/>
    <path d="M40 34 Q46 32 52 34" fill="none" stroke="#C4A67C" stroke-width="1.5"/>
    <!-- Stem -->
    <line x1="46" y1="26" x2="46" y2="20" stroke="#6B5B3F" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>