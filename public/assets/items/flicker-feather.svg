<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Flicker Feather - Red and gray striped feather -->

  <!-- Feather quill/shaft -->
  <path d="M32 60 Q30 50 28 40 Q24 28 20 18 Q18 12 18 6" fill="none" stroke="#E8D8C8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Feather vane - left side -->
  <path d="M18 6 Q10 10 8 18 Q6 26 10 34 Q14 40 22 44 Q26 42 28 38 Q26 28 24 20 Q22 12 18 6Z" fill="#999999" stroke="#000" stroke-width="3"/>

  <!-- Feather vane - right side -->
  <path d="M18 6 Q26 8 30 16 Q34 24 34 32 Q34 40 30 46 Q28 42 28 38 Q26 28 24 20 Q22 12 18 6Z" fill="#999999" stroke="#000" stroke-width="3"/>

  <!-- Red stripes on feather -->
  <path d="M10 16 Q16 14 24 16 Q30 18 32 22" fill="none" stroke="#CC0000" stroke-width="3.5"/>
  <path d="M8 24 Q14 22 24 24 Q32 26 34 30" fill="none" stroke="#CC0000" stroke-width="3.5"/>
  <path d="M12 32 Q18 30 26 32 Q32 34 34 38" fill="none" stroke="#CC0000" stroke-width="3"/>

  <!-- Gray stripe between reds -->
  <path d="M9 20 Q15 18 24 20 Q31 22 33 26" fill="none" stroke="#AAAAAA" stroke-width="2"/>
  <path d="M10 28 Q16 26 25 28 Q32 30 34 34" fill="none" stroke="#AAAAAA" stroke-width="2"/>

  <!-- Feather shaft line (central) -->
  <path d="M18 6 Q22 18 26 30 Q28 38 29 44" fill="none" stroke="#C8B8A8" stroke-width="1.5"/>

  <!-- Quill at bottom -->
  <path d="M29 44 Q30 50 32 60" fill="none" stroke="#E8D8C8" stroke-width="3" stroke-linecap="round"/>
  <!-- Quill tip -->
  <circle cx="32" cy="60" r="1.5" fill="#D8C8B8" stroke="#000" stroke-width="1"/>

  <!-- Feather edge detail (barb lines) -->
  <g stroke="#888" stroke-width="0.8" opacity="0.4">
    <line x1="12" y1="14" x2="20" y2="10"/>
    <line x1="10" y1="20" x2="22" y2="16"/>
    <line x1="8" y1="26" x2="22" y2="22"/>
    <line x1="10" y1="32" x2="24" y2="28"/>
    <line x1="14" y1="38" x2="26" y2="34"/>
    <line x1="24" y1="12" x2="30" y2="18"/>
    <line x1="28" y1="20" x2="32" y2="26"/>
    <line x1="30" y1="28" x2="34" y2="34"/>
  </g>
</svg>