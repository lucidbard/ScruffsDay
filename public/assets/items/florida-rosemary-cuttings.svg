<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Florida Rosemary Cuttings - Sprigs with needle leaves and purple flowers -->

  <!-- Sprig 1 (left) -->
  <g id="sprig-1">
    <!-- Main stem -->
    <path d="M18 58 Q16 45 18 30 Q19 20 20 12" fill="none" stroke="#2E8B57" stroke-width="3" stroke-linecap="round"/>

    <!-- Needle leaves - alternating -->
    <path d="M18 50 Q12 46 8 48" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M18 46 Q24 42 28 44" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M18 42 Q12 38 9 40" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M18 38 Q24 34 27 36" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M19 34 Q13 30 10 32" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M19 30 Q24 27 26 28" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M19 26 Q14 22 12 24" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M20 22 Q24 19 26 20" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>

    <!-- Purple flower at tip -->
    <circle cx="20" cy="10" r="4" fill="#6A5ACD" stroke="#000" stroke-width="2.5"/>
    <circle cx="17" cy="7" r="3" fill="#6A5ACD" stroke="#000" stroke-width="2"/>
    <circle cx="23" cy="7" r="3" fill="#6A5ACD" stroke="#000" stroke-width="2"/>
    <!-- Flower center -->
    <circle cx="20" cy="9" r="1.5" fill="#FFD700"/>
  </g>

  <!-- Sprig 2 (right) -->
  <g id="sprig-2">
    <!-- Main stem -->
    <path d="M44 60 Q42 48 44 34 Q45 24 46 16" fill="none" stroke="#2E8B57" stroke-width="3" stroke-linecap="round"/>

    <!-- Needle leaves -->
    <path d="M44 52 Q38 48 35 50" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M44 48 Q50 44 53 46" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M44 44 Q38 40 36 42" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M44 40 Q50 36 52 38" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M45 36 Q39 32 37 34" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M45 32 Q50 29 52 30" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M45 28 Q40 24 38 26" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>
    <path d="M46 24 Q50 21 52 22" fill="none" stroke="#2E8B57" stroke-width="2" stroke-linecap="round"/>

    <!-- Purple flower at tip -->
    <circle cx="46" cy="14" r="4" fill="#6A5ACD" stroke="#000" stroke-width="2.5"/>
    <circle cx="43" cy="11" r="3" fill="#6A5ACD" stroke="#000" stroke-width="2"/>
    <circle cx="49" cy="11" r="3" fill="#6A5ACD" stroke="#000" stroke-width="2"/>
    <!-- Flower center -->
    <circle cx="46" cy="13" r="1.5" fill="#FFD700"/>
  </g>

  <!-- Small tie/binding at base -->
  <path d="M14 56 Q30 54 48 58" fill="none" stroke="#D2B48C" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M16 58 Q30 56 46 60" fill="none" stroke="#D2B48C" stroke-width="2.5" stroke-linecap="round"/>
</svg>