<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <!-- Scruff - Florida Scrub Jay - Homestar Runner Style -->

  <!-- Legs -->
  <g id="legs">
    <!-- Left leg -->
    <line x1="80" y1="250" x2="75" y2="280" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Left foot -->
    <ellipse cx="72" cy="285" rx="12" ry="7" fill="#CD853F" stroke="#000" stroke-width="3"/>
    <!-- Right leg -->
    <line x1="120" y1="250" x2="125" y2="280" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Right foot -->
    <ellipse cx="128" cy="285" rx="12" ry="7" fill="#CD853F" stroke="#000" stroke-width="3"/>
  </g>

  <!-- Body -->
  <g id="body">
    <!-- Main body - small gray oval -->
    <ellipse cx="100" cy="220" rx="38" ry="42" fill="#A0A0A0" stroke="#000" stroke-width="3"/>
    <!-- Belly patch -->
    <ellipse cx="100" cy="228" rx="24" ry="28" fill="#C8C8C8" stroke="none"/>
    <!-- Left wing -->
    <path d="M62 205 Q45 215 48 240 Q55 248 65 238 Q68 225 62 205Z" fill="#4169E1" stroke="#000" stroke-width="3"/>
    <!-- Right wing -->
    <path d="M138 205 Q155 215 152 240 Q145 248 135 238 Q132 225 138 205Z" fill="#4169E1" stroke="#000" stroke-width="3"/>
  </g>

  <!-- Tail feathers -->
  <g id="tail">
    <path d="M85 258 Q75 278 68 295 Q72 292 80 275Z" fill="#4169E1" stroke="#000" stroke-width="2.5"/>
    <path d="M100 260 Q100 282 98 298 Q104 282 104 260Z" fill="#4169E1" stroke="#000" stroke-width="2.5"/>
    <path d="M115 258 Q125 278 132 295 Q128 292 120 275Z" fill="#4169E1" stroke="#000" stroke-width="2.5"/>
  </g>

  <!-- Head -->
  <g id="head">
    <!-- Main head - oversized round blue -->
    <ellipse cx="100" cy="130" rx="62" ry="58" fill="#4169E1" stroke="#000" stroke-width="3"/>

    <!-- Crest / tuft on top -->
    <path d="M85 78 Q90 55 100 48 Q110 55 115 78" fill="#4169E1" stroke="#000" stroke-width="3"/>
    <path d="M78 82 Q85 62 95 52" fill="none" stroke="#000" stroke-width="2.5"/>
    <path d="M122 82 Q115 62 105 52" fill="none" stroke="#000" stroke-width="2.5"/>

    <!-- White face mask / cheek area -->
    <path d="M55 125 Q60 105 80 100 Q100 95 120 100 Q140 105 145 125 Q140 145 120 148 Q100 150 80 148 Q60 145 55 125Z" fill="white" stroke="none"/>

    <!-- Left eye -->
    <g id="left-eye">
      <ellipse cx="78" cy="122" rx="18" ry="19" fill="white" stroke="#000" stroke-width="3"/>
      <ellipse cx="82" cy="123" rx="8" ry="9" fill="#000"/>
      <!-- Eye highlight -->
      <circle cx="85" cy="119" r="3" fill="white"/>
    </g>

    <!-- Right eye -->
    <g id="right-eye">
      <ellipse cx="122" cy="122" rx="18" ry="19" fill="white" stroke="#000" stroke-width="3"/>
      <ellipse cx="118" cy="123" rx="8" ry="9" fill="#000"/>
      <!-- Eye highlight -->
      <circle cx="121" cy="119" r="3" fill="white"/>
    </g>

    <!-- Thick eyebrows -->
    <path d="M58 106 Q68 96 90 102" fill="none" stroke="#000" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M142 106 Q132 96 110 102" fill="none" stroke="#000" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Beak -->
    <path d="M93 140 L100 158 L107 140" fill="#CD853F" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
    <!-- Beak line -->
    <line x1="95" y1="145" x2="105" y2="145" stroke="#000" stroke-width="2"/>

    <!-- Blue necklace/collar marking -->
    <path d="M68 155 Q100 170 132 155" fill="none" stroke="#3155C8" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>