<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rusty Lyonia Flowers - Small cluster of bell-shaped flowers -->

  <!-- Main stem -->
  <path d="M32 60 Q30 50 28 40 Q27 32 30 22" fill="none" stroke="#2E8B57" stroke-width="3" stroke-linecap="round"/>

  <!-- Branch stems -->
  <path d="M30 35 Q22 30 16 26" fill="none" stroke="#2E8B57" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M29 28 Q35 22 42 18" fill="none" stroke="#2E8B57" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M30 22 Q28 16 24 10" fill="none" stroke="#2E8B57" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M30 30 Q38 32 46 34" fill="none" stroke="#2E8B57" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Small leaves -->
  <path d="M33 45 Q38 42 40 46 Q37 48 33 45Z" fill="#2E8B57" stroke="#000" stroke-width="2"/>
  <path d="M26 42 Q22 38 24 35 Q27 38 26 42Z" fill="#2E8B57" stroke="#000" stroke-width="2"/>

  <!-- Bell-shaped flowers -->
  <!-- Flower 1 (top left) -->
  <g id="flower-1">
    <path d="M14 26 Q12 20 16 16 Q20 14 24 16 Q26 20 24 26 Q20 28 14 26Z" fill="#CD853F" stroke="#000" stroke-width="3"/>
    <path d="M16 25 Q19 28 22 25" fill="none" stroke="#B87333" stroke-width="1.5"/>
    <ellipse cx="19" cy="18" rx="2" ry="1.5" fill="#B87333"/>
  </g>

  <!-- Flower 2 (top right) -->
  <g id="flower-2">
    <path d="M40 18 Q38 12 42 8 Q46 6 50 8 Q52 12 50 18 Q46 20 40 18Z" fill="#CD853F" stroke="#000" stroke-width="3"/>
    <path d="M42 17 Q45 20 48 17" fill="none" stroke="#B87333" stroke-width="1.5"/>
    <ellipse cx="45" cy="10" rx="2" ry="1.5" fill="#B87333"/>
  </g>

  <!-- Flower 3 (top center) -->
  <g id="flower-3">
    <path d="M22 10 Q20 4 24 2 Q28 0 32 2 Q34 6 32 12 Q28 14 22 10Z" fill="#CD853F" stroke="#000" stroke-width="3"/>
    <path d="M24 10 Q27 13 30 10" fill="none" stroke="#B87333" stroke-width="1.5"/>
    <ellipse cx="27" cy="4" rx="2" ry="1.5" fill="#B87333"/>
  </g>

  <!-- Flower 4 (right side) -->
  <g id="flower-4">
    <path d="M44 34 Q42 28 46 24 Q50 22 54 24 Q56 28 54 34 Q50 36 44 34Z" fill="#CD853F" stroke="#000" stroke-width="3"/>
    <path d="M46 33 Q49 36 52 33" fill="none" stroke="#B87333" stroke-width="1.5"/>
    <ellipse cx="49" cy="26" rx="2" ry="1.5" fill="#B87333"/>
  </g>
</svg>